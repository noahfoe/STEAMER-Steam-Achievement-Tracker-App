allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}
def configureNamespaceFromManifest = { subproject ->
    def androidExtension = subproject.extensions.findByName("android")
    if (androidExtension == null || !androidExtension.hasProperty("namespace") || androidExtension.namespace != null) {
        return
    }

    def manifestFile = subproject.file("src/main/AndroidManifest.xml")
    if (!manifestFile.exists()) {
        return
    }

    def manifestPackage = new XmlSlurper().parse(manifestFile).@package.text()
    if (manifestPackage) {
        androidExtension.namespace = manifestPackage
    }
}

subprojects { subproject ->
    subproject.pluginManager.withPlugin("com.android.application") {
        configureNamespaceFromManifest(subproject)
    }
    subproject.pluginManager.withPlugin("com.android.library") {
        configureNamespaceFromManifest(subproject)
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
